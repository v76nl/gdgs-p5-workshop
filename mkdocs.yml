site_name: p5.js workshop

theme:
    name: material
    language: ja

    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: pink
          accent: pink
          toggle:
              icon: material/brightness-7
              name: ダークモードに切り替え
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: pink
          accent: pink
          toggle:
              icon: material/brightness-4
              name: ライトモードに切り替え

    features:
        - navigation.instant
        - navigation.tracking
        - navigation.tabs
        - content.code.copy
        - navigation.footer
        - navigation.top

nav:
    - トップページ: index.md
    - 導入: intro.md
    - Level 0 - p5.jsに触れてみる: level_0.md
    - Level 1 - circle関数: level_1.md
    - Level 2 - フレーム: level_2.md
    - Level 3 - random関数とRGB: level_3.md
    - Level 4 - 変数: level_4.md
    - Level 5 - if文: level_5.md
    - EX - 余裕があれば: EX.md

markdown_extensions:
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.superfences